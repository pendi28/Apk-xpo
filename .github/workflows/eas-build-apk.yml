Name: Build Android APK (EAS)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'artifacts/xpogo-mobile/**'
  workflow_dispatch:
    inputs:
      message:
        description: 'Build message'
        required: false
        default: 'Manual build'

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        --recusive

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: |
          cd artifacts/xpogo-mobile
          eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          EXPO_PUBLIC_FIREBASE_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      - name: Info build
        run: |
          echo "✅ Build APK submitted ke EAS!"
          echo "📥 Download di: https://expo.dev/accounts/pendi55/projects/xpogo-mobile/builds"
