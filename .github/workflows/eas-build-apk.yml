name: Build Android APK (Local)

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Build message'
        required: false
        default: 'Manual build'

jobs:
  build:
    name: Build APK di GitHub Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK lokal (tidak pakai kuota EAS)
        run: |
          cd artifacts/xpogo-mobile
          eas build --local --platform android --profile preview --non-interactive --output ./XpoGo.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          EXPO_PUBLIC_FIREBASE_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          EXPO_PUBLIC_WEB_DOMAIN: apps-tmdb.web.app

      - name: Upload APK ke GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XpoGo-APK
          path: artifacts/xpogo-mobile/XpoGo.apk
          retention-days: 30
