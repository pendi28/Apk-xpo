name: Deploy Web ke Firebase Hosting

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'artifacts/xpogo/**'

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/xpogo run build

      - name: Deploy ke Firebase Hosting
        run: pnpm --filter @workspace/xpogo run deploy
